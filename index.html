<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Slice Dog 🍕</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 11px; color: #7f8c8d; font-weight: bold; margin-bottom: 4px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; background: #e67e22; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-main:disabled { background: #bdc3c7; }
        
        /* Botón de WhatsApp especial */
        .btn-ws { display: none; background: #25d366; margin-top: 15px; text-decoration: none; padding: 12px; border-radius: 10px; color: white; font-weight: bold; font-size: 14px; align-items: center; justify-content: center; gap: 8px; }

        .reglas-box { background: #fffaf0; border: 1px solid #f3e5ab; padding: 12px; border-radius: 10px; font-size: 11px; text-align: left; height: 80px; overflow-y: scroll; margin-bottom: 10px; }
        .stamps { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 25px; }
        .stamp { width: 50px; height: 50px; border-radius: 50%; border: 2px dashed #bdc3c7; display: flex; align-items: center; justify-content: center; color: #bdc3c7; font-weight: bold; }
        .active { background: #f1c40f; color: white; border: 2px solid #f39c12; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="card">
    <h2 id="titulo">Slice Dog 🍕</h2>
    <p id="subtitulo">Cargando...</p>

    <div class="input-group">
        <label>WHATSAPP</label>
        <input type="text" id="clienteId" placeholder="Ej: 56912345678">
    </div>

    <div class="input-group" id="grupoNombre">
        <label>NOMBRE</label>
        <input type="text" id="clienteNombre" placeholder="Nombre del cliente">
    </div>

    <div class="input-group" id="grupoCorreo" style="display:none;">
        <label>CORREO ELECTRÓNICO</label>
        <input type="email" id="clienteCorreo" placeholder="ejemplo@correo.com">
    </div>

    <div id="seccionLegal" style="display:none;">
        <div class="reglas-box">
            <strong>Reglas:</strong> 10 sellos = 1 pizza de regalo. Válido en pizzas Medianas y Grandes. Expira el 31/12/2026.
        </div>
        <label style="display: flex; gap: 8px; align-items: center;">
            <input type="checkbox" id="aceptoBases" onchange="validar()"> Acepto las reglas.
        </label>
    </div>

    <button class="btn-main" id="btnAccion" onclick="procesar()">Consultar</button>
    
    <a href="#" id="btnNotificar" class="btn-ws" target="_blank">
        📲 NOTIFICAR: ¡Falta solo 1!
    </a>

    <div class="stamps" id="contenedorPuntos"></div>
</div>

<script>
    const WEB_APP_URL = "TU_URL_DE_GOOGLE_AQUÍ"; // REEMPLAZA ESTO
    const urlParams = new URLSearchParams(window.location.search);
    const MODO = urlParams.get('registro') === 'nuevo' ? 'REG' : (urlParams.get('admin') === 'dog2024' ? 'ADM' : 'CLI');

    if (MODO === 'REG') {
        document.getElementById('subtitulo').innerText = "¡Regístrate y gana un sello! 🎁";
        document.getElementById('btnAccion').innerText = "Unirme al Club";
        document.getElementById('btnAccion').disabled = true;
        document.getElementById('grupoCorreo').style.display = "block";
        document.getElementById('seccionLegal').style.display = "block";
    } else if (MODO === 'ADM') {
        document.getElementById('subtitulo').innerText = "Panel Admin 🛠️";
        document.getElementById('btnAccion').innerText = "Sumar Sello (+1)";
        document.getElementById('grupoCorreo').style.display = "block";
    } else {
        document.getElementById('subtitulo').innerText = "Consulta tus puntos 🍕";
        document.getElementById('clienteNombre').disabled = true;
    }

    function validar() {
        if (MODO === 'REG') document.getElementById('btnAccion').disabled = !document.getElementById('aceptoBases').checked;
    }

    async function procesar() {
        const id = document.getElementById('clienteId').value.trim();
        const nom = document.getElementById('clienteNombre').value.trim();
        const cor = document.getElementById('clienteCorreo').value.trim();
        const btn = document.getElementById('btnAccion');
        const btnWS = document.getElementById('btnNotificar');

        if (!id) return alert("Falta el número");
        if (MODO === 'REG' && (!nom || !cor)) return alert("Nombre y correo obligatorios");

        btn.innerText = "Procesando...";
        btn.disabled = true;
        btnWS.style.display = "none";

        try {
            const res = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({
                    id: id, nombre: nom, correo: cor,
                    accion: MODO === 'REG' ? 'registrar_nuevo' : (MODO === 'ADM' ? 'sumar' : 'consultar'),
                    clave: MODO === 'ADM' ? 'dog2024' : ''
                })
            });
            const data = await res.json();
            
            if (data.error) {
                alert(data.error);
            } else {
                iluminar(data.puntos || 0);
                if (data.nombre) document.getElementById('clienteNombre').value = data.nombre;

                // LÓGICA DE NOTIFICACIÓN (Sello 9)
                if (MODO === 'ADM' && data.puntos === 9) {
                    const mensaje = `¡Hola ${data.nombre || ''}! 🍕 Soy de Slice Dog. ¡Te falta solo 1 SELLO para tu PIZZA GRATIS! Te esperamos pronto para completar tu tarjeta.`;
                    btnWS.href = `https://wa.me/${id}?text=${encodeURIComponent(mensaje)}`;
                    btnWS.style.display = "flex";
                }
                if (MODO === 'REG') alert("¡Bienvenido! Primer sello de regalo activado.");
            }
        } catch (e) { alert("Error de conexión"); }
        finally { btn.innerText = MODO === 'REG' ? "Unirme" : "Procesar"; btn.disabled = false; }
    }

    function iluminar(puntos) {
        const cont = document.getElementById('contenedorPuntos');
        cont.innerHTML = "";
        for(let i=1; i<=10; i++) {
            let div = document.createElement('div');
            div.className = i <= puntos ? 'stamp active' : 'stamp';
            div.innerText = i;
            cont.appendChild(div);
        }
    }
    iluminar(0);
</script>
</body>
</html>
