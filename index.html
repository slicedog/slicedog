<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recompensas Slice Dog 🍕</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 12px; color: #34495e; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .reglas-box { background: #fdfaf6; border: 1px solid #f3e5ab; padding: 15px; border-radius: 10px; font-size: 11px; color: #5d4037; text-align: left; height: 90px; overflow-y: scroll; margin-bottom: 10px; }
        .checkbox-group { display: flex; align-items: flex-start; gap: 8px; text-align: left; font-size: 12px; margin-bottom: 20px; }
        .btn-main { width: 100%; padding: 15px; background-color: #e67e22; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-main:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .stamps { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 25px; }
        .stamp { width: 50px; height: 50px; border-radius: 50%; border: 2px dashed #bdc3c7; display: flex; align-items: center; justify-content: center; color: #bdc3c7; font-weight: bold; transition: 0.4s; }
        .active { background-color: #f1c40f; color: white; border: 2px solid #f39c12; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="titulo">Slice Dog 🍕</h2>
    <p id="subtitulo">Cargando...</p>

    <div class="input-group">
        <label>WHATSAPP (ID)</label>
        <input type="text" id="clienteId" placeholder="Ej: 56912345678">
    </div>

    <div class="input-group" id="grupoNombre">
        <label>TU NOMBRE</label>
        <input type="text" id="clienteNombre" placeholder="¿Cómo te llamamos?">
    </div>

    <div class="input-group" id="grupoCorreo" style="display: none;">
        <label>CORREO ELECTRÓNICO (OBLIGATORIO)</label>
        <input type="email" id="clienteCorreo" placeholder="ejemplo@correo.com">
    </div>

    <div id="seccionLegal" style="display:none;">
        <label>BASES DEL PROGRAMA</label>
        <div class="reglas-box">
            <strong>• Premio:</strong> 10 sellos = 1 pizza de regalo.<br>
            <strong>• Aplica para:</strong> Pizzas Medianas y Grandes.<br>
            <strong>• Vigencia:</strong> Hasta el 31 de diciembre de 2026.
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="aceptoBases" onchange="validarBoton()">
            <span>Acepto las bases y deseo mi primer sello gratis.</span>
        </div>
    </div>

    <button class="btn-main" id="btnAccion" onclick="procesar()">Ver mis sellos</button>
    <div class="stamps" id="contenedorPuntos"></div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbylbTtHRRQK2fiawomDnSbB9zQqfvjgsHo9JA8qSGoB6T7uR8tktMDa-F2q5CPFRCM46A/exec";
    const urlParams = new URLSearchParams(window.location.search);
    const MODO = urlParams.get('registro') === 'nuevo' ? 'REGISTRO' : (urlParams.get('admin') === 'dog2024' ? 'ADMIN' : 'CLIENTE');

    if (MODO === 'REGISTRO') {
        document.getElementById('subtitulo').innerText = "¡Únete y gana un sello de regalo! 🎁";
        document.getElementById('btnAccion').innerText = "Unirme al Club";
        document.getElementById('btnAccion').disabled = true;
        document.getElementById('grupoCorreo').style.display = "block"; // Mostrar correo
        document.getElementById('seccionLegal').style.display = "block";
    } else if (MODO === 'ADMIN') {
        document.getElementById('subtitulo').innerText = "Panel Administrativo 🛠️";
        document.getElementById('btnAccion').innerText = "Registrar Pizza (+1)";
        document.getElementById('grupoCorreo').style.display = "block"; // Permitir al admin editar correo
    } else {
        document.getElementById('subtitulo').innerText = "Consulta tus sellos 🍕";
        document.getElementById('btnAccion').innerText = "Ver mis sellos";
        document.getElementById('clienteNombre').disabled = true;
    }

    function validarBoton() {
        if (MODO === 'REGISTRO') {
            document.getElementById('btnAccion').disabled = !document.getElementById('aceptoBases').checked;
        }
    }

    async function procesar() {
        const id = document.getElementById('clienteId').value.trim();
        const nombre = document.getElementById('clienteNombre').value.trim();
        const correo = document.getElementById('clienteCorreo').value.trim();
        
        if (!id) return alert("Ingresa tu WhatsApp.");

        if (MODO === 'REGISTRO') {
            if (!nombre || !correo) return alert("Nombre y correo son obligatorios para registrarte.");
            if (!correo.includes("@")) return alert("Por favor, ingresa un correo válido.");
        }

        const btn = document.getElementById('btnAccion');
        const txt = btn.innerText;
        btn.innerText = "Procesando...";
        btn.disabled = true;

        try {
            const res = await fetch(WEB_APP_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    id: id, 
                    nombre: nombre, 
                    correo: correo, 
                    accion: MODO === 'REGISTRO' ? 'registrar_nuevo' : (MODO === 'ADMIN' ? 'sumar' : 'consultar'),
                    clave: MODO === 'ADMIN' ? 'dog2024' : ''
                }) 
            });
            const data = await res.json();
            
            if (data.error) {
                alert(data.error);
            } else {
                if (MODO === 'REGISTRO') alert("¡Bienvenido! Ya tienes tu primer sello.");
                iluminar(data.puntos || 0);
                if (data.nombre) document.getElementById('clienteNombre').value = data.nombre;
            }
        } catch (e) { alert("Error de conexión"); }
        finally { 
            btn.innerText = txt; 
            if (MODO !== 'REGISTRO') btn.disabled = false;
            else validarBoton();
        }
    }

    function iluminar(puntos) {
        const cont = document.getElementById('contenedorPuntos');
        cont.innerHTML = "";
        for(let i=1; i<=10; i++) {
            let div = document.createElement('div');
            div.className = i <= puntos ? 'stamp active' : 'stamp';
            div.innerText = i;
            cont.appendChild(div);
        }
    }
    iluminar(0);
</script>
</body>
</html>
